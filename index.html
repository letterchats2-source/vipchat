<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TranslateTalk VIP</title>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        #remote-player { width: 100vw; height: 100vh; background: #000; }
        #local-player { width: 100px; height: 140px; position: absolute; top: 15px; right: 15px; border-radius: 12px; border: 2px solid #fff; z-index: 10; background: #222; }
        #subtitle-box { position: absolute; bottom: 110px; left: 5%; width: 90%; text-align: center; background: rgba(0,0,0,0.8); padding: 12px; font-size: 17px; border-radius: 10px; color: #00FF00; font-weight: bold; z-index: 20; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; }
        .join-btn { padding: 20px 40px; font-size: 20px; background: #28a745; color: white; border: none; border-radius: 50px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="overlay">
        <h3 id="info">Oda Hazır</h3>
        <button class="join-btn" onclick="startCall()">GÖRÜŞMEYE KATIL</button>
    </div>

    <div id="remote-player"></div>
    <div id="local-player"></div>
    <div id="subtitle-box">...</div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const options = {
            appId: "fc667e2e21154602bba044359e5771a9",
            channel: urlParams.get("channel")?.trim() || "test",
            myLang: urlParams.get("myLang") || "tr-TR",
            targetLang: urlParams.get("targetLang") || "English",
            groqKey: urlParams.get("gKey") || ""
        };

        let client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
        let localTracks = [];

        client.on("user-published", async (user, mediaType) => {
            await client.subscribe(user, mediaType);
            if (mediaType === "video") user.videoTrack.play("remote-player");
            if (mediaType === "audio") user.audioTrack.play();
        });

        async function startCall() {
            document.getElementById("overlay").style.display = "none";
            try {
                // Kamera ve mikrofonu tek tek deniyoruz (Hata yakalamak için)
                const audio = await AgoraRTC.createMicrophoneAudioTrack();
                const video = await AgoraRTC.createCameraVideoTrack({ encoderConfig: "240p_1" });
                
                localTracks = [audio, video];
                await client.join(options.appId, options.channel, null, null);
                video.play("local-player");
                await client.publish(localTracks);
                
                startRecognition();
            } catch (err) {
                if (err.code === "NOT_READABLE") {
                    alert("Kamera şu an meşgul! Lütfen tableti yeniden başlatıp tekrar deneyin.");
                } else {
                    alert("Hata: " + err.message);
                }
                // Kamera hatası alsa bile sadece sesle girmeyi dene
                fallbackAudio();
            }
        }

        async function fallbackAudio() {
            try {
                const audio = await AgoraRTC.createMicrophoneAudioTrack();
                await client.join(options.appId, options.channel, null, null);
                await client.publish(audio);
                startRecognition();
            } catch (e) { console.error("Ses de açılamadı"); }
        }

        function startRecognition() {
            const sr = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!sr) return;
            const rec = new sr();
            rec.lang = options.myLang;
            rec.continuous = true;
            rec.onresult = async (e) => {
                const text = e.results[e.results.length - 1][0].transcript;
                if(text.trim()) translateWithGroq(text);
            };
            rec.onend = () => rec.start();
            rec.start();
        }

        async function translateWithGroq(text) {
            if (!options.groqKey) return;
            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${options.groqKey}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama3-8b-8192",
                        messages: [{ role: "user", content: `Translate to ${options.targetLang}, result only: ${text}` }]
                    })
                });
                const data = await res.json();
                document.getElementById("subtitle-box").innerText = data.choices[0].message.content;
            } catch (err) {}
        }

        // --- ZOMBİ SESLERİ ÖLDÜREN KAPATMA ---
        async function leaveCall() {
            localTracks.forEach(track => {
                track.stop();
                track.close();
            });
            await client.leave();
            if (window.AndroidBridge) window.AndroidBridge.closeCall();
        }
    </script>
</body>
</html>
