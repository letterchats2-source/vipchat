<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TranslateTalk VIP</title>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        #remote-player { width: 100vw; height: 100vh; background: #000; display: flex; align-items: center; justify-content: center; }
        #local-player { 
            width: 110px; height: 150px; position: absolute; top: 20px; right: 20px; 
            border-radius: 12px; border: 2px solid #fff; z-index: 10; background: #222;
        }
        #subtitle-box { 
            position: absolute; bottom: 120px; left: 5%; width: 90%; 
            text-align: center; background: rgba(0,0,0,0.7); padding: 15px; 
            font-size: 18px; border-radius: 10px; color: #00FF00; font-weight: bold; z-index: 20;
        }
        #status-bar { position: absolute; top: 10px; left: 10px; font-size: 11px; color: #555; z-index: 30; }
        #controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; z-index: 100; }
        .btn-end { width: 70px; height: 70px; background: #FF3B30; border-radius: 50%; border: none; color: white; font-size: 30px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="status-bar">Sistem Hazırlanıyor...</div>
    <div id="remote-player"><span>Görüntü Bekleniyor...</span></div>
    <div id="local-player"></div>
    <div id="subtitle-box">Konuşmalar burada görünecek...</div>

    <div id="controls">
        <button class="btn-end" onclick="leaveCall()">✕</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const options = {
            appId: "fc667e2e21154602bba044359e5771a9",
            channel: urlParams.get("channel") || "test",
            myLang: urlParams.get("myLang") || "tr-TR",
            targetLang: urlParams.get("targetLang") || "English",
            groqKey: urlParams.get("gKey") || ""
        };

        let client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
        let localTracks = { videoTrack: null, audioTrack: null };

        // 1. Dinleyiciyi sabitle (Hiçbir şeyi kaçırma)
        client.on("user-published", async (user, mediaType) => {
            await client.subscribe(user, mediaType);
            if (mediaType === "video") {
                document.getElementById("remote-player").innerHTML = "";
                user.videoTrack.play("remote-player");
                updateStatus("Canlı görüntü bağlandı.");
            }
            if (mediaType === "audio") {
                user.audioTrack.play();
            }
        });

        async function startCall() {
            try {
                updateStatus("Cihazlar açılıyor...");
                localTracks.audioTrack = await AgoraRTC.createMicrophoneAudioTrack();
                localTracks.videoTrack = await AgoraRTC.createCameraVideoTrack({ encoderConfig: "360p_7" }); // Daha hızlı yükleme için düşük çözünürlük

                updateStatus("Kanala giriliyor...");
                await client.join(options.appId, options.channel, null, null);
                
                localTracks.videoTrack.play("local-player");
                await client.publish(Object.values(localTracks));

                updateStatus("Bağlantı aktif. Konuşabilirsiniz.");
                startRecognition();
            } catch (err) {
                updateStatus("Bağlantı Hatası: " + err.message);
            }
        }

        function updateStatus(msg) {
            document.getElementById("status-bar").innerText = msg;
        }

        // --- SES VE ÇEVİRİ ---
        function startRecognition() {
            const sr = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!sr) return;
            const rec = new sr();
            rec.lang = options.myLang;
            rec.continuous = true;
            rec.onresult = async (e) => {
                const text = e.results[e.results.length - 1][0].transcript;
                if(text.trim()) translateText(text);
            };
            rec.onend = () => rec.start();
            rec.start();
        }

        async function translateText(text) {
            if (!options.groqKey) return;
            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${options.groqKey}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama3-8b-8192",
                        messages: [{ role: "user", content: `Translate this to ${options.targetLang}, result only: ${text}` }]
                    })
                });
                const data = await res.json();
                document.getElementById("subtitle-box").innerText = data.choices[0].message.content;
            } catch (h) {}
        }

        // --- TEMİZ KAPATMA ---
        async function leaveCall() {
            updateStatus("Kapatılıyor...");
            if (localTracks.videoTrack) { localTracks.videoTrack.stop(); localTracks.videoTrack.close(); }
            if (localTracks.audioTrack) { localTracks.audioTrack.stop(); localTracks.audioTrack.close(); }
            await client.leave();

            // ANDROID'E KAPATMA SİNYALİ GÖNDER
            if (window.AndroidBridge) {
                window.AndroidBridge.closeCall();
            } else {
                window.location.href = "about:blank";
            }
        }

        window.onload = startCall;
    </script>
</body>
</html>
