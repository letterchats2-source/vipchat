<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TranslateTalk VIP</title>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        #remote-player { width: 100vw; height: 100vh; background: #1a1a1a; display: flex; align-items: center; justify-content: center; }
        #local-player { 
            width: 120dp; height: 160dp; 
            position: absolute; top: 20px; right: 20px; 
            border-radius: 12px; overflow: hidden; 
            border: 2px solid #ffffff; z-index: 10;
            background: #333;
            width: 110px; height: 150px;
        }
        #subtitle-box { 
            position: absolute; bottom: 120px; left: 5%; width: 90%; 
            text-align: center; background: rgba(0,0,0,0.7); 
            padding: 15px; font-size: 18px; border-radius: 10px;
            min-height: 40px; z-index: 20; color: #00FF00;
            font-weight: bold; text-shadow: 1px 1px 2px #000;
        }
        #status-bar {
            position: absolute; top: 10px; left: 10px; 
            font-size: 12px; color: #aaa; z-index: 30;
        }
        #controls { 
            position: absolute; bottom: 30px; width: 100%; 
            display: flex; justify-content: center; z-index: 100; 
        }
        .btn-end { 
            width: 70px; height: 70px; background: #FF3B30; 
            border-radius: 50%; border: none; color: white; 
            font-size: 30px; cursor: pointer; box-shadow: 0 4px 15px rgba(255,59,48,0.4);
        }
    </style>
</head>
<body>

    <div id="status-bar">Sistem Başlatılıyor...</div>
    <div id="remote-player">
        <span>Görüntü Bekleniyor...</span>
    </div>
    <div id="local-player"></div>
    <div id="subtitle-box">Konuşmanız çevrilip burada görünecek...</div>

    <div id="controls">
        <button class="btn-end" onclick="leaveCall()">✕</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const options = {
    appId: "fc667e2e21154602bba044359e5771a9",
    channel: urlParams.get("channel") || "test",
    myLang: urlParams.get("myLang") || "tr-TR",
    targetLang: urlParams.get("targetLang") || "English",
    groqKey: urlParams.get("gKey") // Anahtarı artık URL'den alacağız
};

        let client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
        let localTracks = { videoTrack: null, audioTrack: null };

        async function startCall() {
            updateStatus("Kanala bağlanılıyor...");
            
            try {
                // Karşı tarafın yayınını dinle
                client.on("user-published", async (user, mediaType) => {
                    await client.subscribe(user, mediaType);
                    updateStatus("Bağlantı kuruldu.");
                    if (mediaType === "video") {
                        document.getElementById("remote-player").innerHTML = ""; 
                        user.videoTrack.play("remote-player");
                    }
                    if (mediaType === "audio") {
                        user.audioTrack.play();
                    }
                });

                // Kamera ve Mikrofonu aç
                [localTracks.audioTrack, localTracks.videoTrack] = await Promise.all([
                    AgoraRTC.createMicrophoneAudioTrack(),
                    AgoraRTC.createCameraVideoTrack({ encoderConfig: "720p_1" })
                ]);

                // Kanala gir
                options.uid = await client.join(options.appId, options.channel, options.token, null);
                
                // Kendi görüntünü oynat
                localTracks.videoTrack.play("local-player");
                
                // Yayını paylaş
                await client.publish(Object.values(localTracks));
                updateStatus("Yayın yapılıyor. Kanal: " + options.channel);
                
                // Ses Tanımayı Başlat
                startRecognition();

            } catch (err) {
                updateStatus("HATA: " + err.message);
                alert("Kamera/Mikrofon başlatılamadı: " + err.message);
            }
        }

        function updateStatus(msg) {
            document.getElementById("status-bar").innerText = msg;
            console.log(msg);
        }

        // --- SES TANIMA VE ÇEVİRİ ---
        function startRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                updateStatus("Tarayıcı ses tanımayı desteklemiyor.");
                return;
            }

            const recognition = new SpeechRecognition();
            recognition.lang = options.myLang;
            recognition.continuous = true;
            recognition.interimResults = false;

            recognition.onresult = async (event) => {
                const text = event.results[event.results.length - 1][0].transcript;
                if(text.trim() !== "") {
                    translateWithGroq(text);
                }
            };

            recognition.onerror = (e) => {
                console.error("Speech Error: ", e.error);
                if(e.error !== "no-speech") recognition.stop();
            };
            
            recognition.onend = () => recognition.start();
            recognition.start();
        }

        async function translateWithGroq(text) {
            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { 
                        "Authorization": `Bearer ${options.groqKey}`, 
                        "Content-Type": "application/json" 
                    },
                    body: JSON.stringify({
                        model: "llama3-8b-8192",
                        messages: [{ 
                            role: "user", 
                            content: `Translate the following text to ${options.targetLang}. Provide ONLY the translation without any explanation: ${text}` 
                        }]
                    })
                });
                const data = await response.json();
                const translated = data.choices[0].message.content;
                
                document.getElementById("subtitle-box").innerText = translated;
            } catch (err) {
                console.error("Çeviri Hatası:", err);
            }
        }

        async function leaveCall() {
            try {
                for (let trackName in localTracks) {
                    let track = localTracks[trackName];
                    if (track) {
                        track.stop();
                        track.close();
                    }
                }
                await client.leave();
                // Android WebView'ı kapatmak için bir sinyal gönderiyoruz
                window.location.href = "about:blank"; 
            } catch (e) {
                window.location.href = "about:blank";
            }
        }

        // Sayfa yüklendiğinde başlat
        window.onload = startCall;
    </script>
</body>
</html>
