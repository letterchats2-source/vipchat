<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TranslateTalk VIP</title>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        #remote-player { position: fixed; width: 100vw; height: 100vh; background: #111; z-index: 1; top:0; left:0; }
        #local-player { position: fixed; width: 110px; height: 150px; top: 20px; right: 20px; border-radius: 12px; border: 2px solid #fff; z-index: 10; background: #222; }
        #subtitle-box { position: fixed; bottom: 130px; left: 5%; width: 84%; text-align: center; background: rgba(0,0,0,0.7); padding: 15px; font-size: 18px; border-radius: 10px; color: #fff; z-index: 100; min-height: 25px; border: 1px solid #444; }
        #controls { position: fixed; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 40px; z-index: 200; }
        .btn-translate { width: 80px; height: 80px; background: #FF9800; border-radius: 50%; border: 4px solid #fff; color: white; font-weight: bold; cursor: pointer; }
        .btn-end { width: 70px; height: 70px; background: #FF3B30; border-radius: 50%; border: 4px solid #fff; color: white; font-size: 30px; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .join-btn { padding: 20px 50px; font-size: 22px; background: #28a745; color: white; border-radius: 50px; cursor: pointer; border: 4px solid #fff; }
    </style>
</head>
<body>
    <div id="overlay"><button class="join-btn" onclick="startCall()">GÖRÜŞMEYİ BAŞLAT</button></div>
    <div id="remote-player"></div>
    <div id="local-player"></div>
    <div id="subtitle-box">Konuşun ve ÇEVİR'e basın...</div>
    <div id="controls">
        <button id="trans-btn" class="btn-translate" onclick="manualTranslate()">ÇEVİR</button>
        <button class="btn-end" onclick="leaveCall()">✕</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const mode = urlParams.get("mode") || "global";
        const options = {
            appId: "fc667e2e21154602bba044359e5771a9",
            channel: urlParams.get("channel"),
            targetLang: urlParams.get("targetLang") || "English",
            groqKey: urlParams.get("gKey") || ""
        };

        let client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
        let localTracks = { videoTrack: null };
        let lastSpokenText = "";

        if (mode !== "global") {
            document.getElementById("trans-btn").style.display = "none";
            document.getElementById("subtitle-box").style.display = "none";
        }

        // AGORA 4.X MESAJ ALMA (KARŞI TARAFTAN GELEN)
        client.on("stream-message", (uid, data) => {
            const text = new TextDecoder().decode(data);
            const box = document.getElementById("subtitle-box");
            box.innerText = text;
            box.style.color = "#00FF00"; // Karşıdan gelen çeviri YEŞİL
        });

        client.on("user-published", async (user, mediaType) => {
            await client.subscribe(user, mediaType);
            if (mediaType === "video" && mode !== "audio") user.videoTrack.play("remote-player");
            if (mediaType === "audio") user.audioTrack.play();
        });

        async function startCall() {
            document.getElementById("overlay").style.display = "none";
            try {
                localTracks.videoTrack = await AgoraRTC.createCameraVideoTrack({
                    encoderConfig: "240p_1" // Düşük kaynak kullanımı (Infinix için)
                });
                await client.join(options.appId, options.channel, null, null);
                localTracks.videoTrack.play("local-player");
                await client.publish(localTracks.videoTrack);
            } catch (err) { console.error(err); }
        }

        // ANDROID'DEN METİN ALMA (window nesnesine bağlı)
        window.receiveFromAndroid = function(text) {
            lastSpokenText = text;
            const box = document.getElementById("subtitle-box");
            box.innerText = text;
            box.style.color = "#fff";
        };

        window.receivePartialFromAndroid = function(text) {
            document.getElementById("subtitle-box").innerText = "..." + text;
        };

        // ÇEVİRİ VE AGORA 4.X MESAJ GÖNDERME
        async function manualTranslate() {
            if (!lastSpokenText) return;
            const btn = document.getElementById("trans-btn");
            const box = document.getElementById("subtitle-box");
            btn.innerText = "⏳";
            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": "Bearer " + options.groqKey, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama3-8b-8192",
                        messages: [{ role: "user", content: "Translate this to " + options.targetLang + ". ONLY translation: " + lastSpokenText }]
                    })
                });
                const data = await response.json();
                const translated = data.choices[0].message.content;
                
                box.innerText = translated;
                box.style.color = "#00FF00";

                // AGORA 4.X MESAJ GÖNDERME (Direct method)
                const msg = new TextEncoder().encode(translated);
                await client.sendStreamMessage(msg);

            } catch (e) { box.innerText = "Hata!"; }
            finally { btn.innerText = "ÇEVİR"; }
        }

        async function leaveCall() {
            if (localTracks.videoTrack) { localTracks.videoTrack.stop(); localTracks.videoTrack.close(); }
            await client.leave();
            // Android'deki closeCall() fonksiyonunu tetikle
            if (window.AndroidBridge) window.AndroidBridge.closeCall();
        }
    </script>
</body>
</html>
