<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TranslateTalk VIP</title>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        #remote-player { position: absolute; width: 100vw; height: 100vh; background: #111; z-index: 1; }
        #local-player { 
            width: 100px; height: 140px; position: absolute; top: 15px; right: 15px; 
            border-radius: 12px; border: 2px solid #fff; z-index: 100; background: #222;
        }
        #subtitle-box { 
            position: absolute; bottom: 130px; left: 5%; width: 90%; 
            text-align: center; background: rgba(0,0,0,0.8); padding: 12px; 
            font-size: 18px; border-radius: 10px; color: #00FF00; font-weight: bold; z-index: 999;
            min-height: 25px; border: 1px solid rgba(255,255,255,0.2);
        }
        #controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 40px; z-index: 1000; }
        .btn-translate { 
            width: 80px; height: 80px; background: #FF9800; border-radius: 50%; 
            border: 4px solid #fff; color: white; font-weight: bold; cursor: pointer;
            -webkit-tap-highlight-color: transparent; outline: none;
        }
        .btn-translate:active { transform: scale(0.9); background: #e68a00; }
        .btn-end { width: 70px; height: 70px; background: #FF3B30; border-radius: 50%; border: 4px solid #fff; color: white; font-size: 30px; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .join-btn { padding: 20px 50px; font-size: 22px; background: #28a745; color: white; border: 4px solid #fff; border-radius: 50px; cursor: pointer; font-weight: bold; }
        #status-bar { position: absolute; top: 10px; left: 10px; font-size: 11px; color: #aaa; z-index: 1001; }
    </style>
</head>
<body>

    <div id="overlay">
        <h2>TranslateTalk VIP</h2>
        <button class="join-btn" onclick="startCall()">GÖRÜŞMEYİ BAŞLAT</button>
    </div>

    <div id="status-bar">Bekleniyor...</div>
    <div id="remote-player"></div>
    <div id="local-player"></div>
    <div id="subtitle-box">Mikrofon hazırlanıyor...</div>

    <div id="controls">
        <button id="trans-btn" class="btn-translate" onclick="manualTranslate()">ÇEVİR</button>
        <button class="btn-end" onclick="leaveCall()">✕</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const mode = urlParams.get("mode") || "global";
        const options = {
            appId: "fc667e2e21154602bba044359e5771a9",
            channel: urlParams.get("channel") || "test",
            myLang: urlParams.get("myLang") || "tr-TR",
            targetLang: urlParams.get("targetLang") || "English",
            groqKey: urlParams.get("gKey") || ""
        };

        let client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
        let localTracks = [];
        let lastSpokenText = "";
        let recognition = null;

        if (mode !== "global") {
            document.getElementById("trans-btn").style.display = "none";
            document.getElementById("subtitle-box").style.display = "none";
        }

        client.on("user-published", async (user, mediaType) => {
            await client.subscribe(user, mediaType);
            if (mediaType === "video") user.videoTrack.play("remote-player");
            if (mediaType === "audio") user.audioTrack.play();
        });

        async function startCall() {
            document.getElementById("overlay").style.display = "none";
            updateStatus("Bağlanılıyor...");

            try {
                const tracks = await AgoraRTC.createMicrophoneAndCameraTracks({}, {encoderConfig: "240p_1"});
                localTracks = tracks;
                await client.join(options.appId, options.channel, null, null);
                
                if (mode !== "audio") localTracks[1].play("local-player");
                await client.publish(localTracks);
                
                updateStatus("Yayın Aktif 🟢");
                if (mode === "global") startRecognition();
            } catch (err) {
                updateStatus("HATA: " + err.message);
            }
        }

        function updateStatus(msg) {
            document.getElementById("status-bar").innerText = msg;
        }

        // --- SES TANIMA (STT) MOTORU ---
        function startRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                document.getElementById("subtitle-box").innerText = "STT desteklenmiyor.";
                return;
            }

            recognition = new SpeechRecognition();
            recognition.lang = options.myLang;
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.onstart = () => {
                document.getElementById("subtitle-box").innerText = "Sizi dinliyorum... 🎙️";
                document.getElementById("subtitle-box").style.color = "#00FF00";
            };

            recognition.onresult = (e) => {
                const text = e.results[e.results.length - 1][0].transcript;
                lastSpokenText = text;
                document.getElementById("subtitle-box").innerText = "Duyulan: " + text;
                document.getElementById("subtitle-box").style.color = "#fff";
            };

            recognition.onerror = (event) => {
                console.log("STT Error: " + event.error);
                if (event.error === 'not-allowed') alert("Mikrofon izni web tarafında reddedildi!");
            };

            recognition.onend = () => {
                // Konuşma bitse bile motoru hep açık tut
                recognition.start();
            };

            recognition.start();
        }

        // --- MANUEL ÇEVİRİ ---
        async function manualTranslate() {
            const btn = document.getElementById("trans-btn");
            const box = document.getElementById("subtitle-box");

            if (!lastSpokenText || lastSpokenText.trim() === "") {
                box.innerText = "⚠️ Ses algılanmadı, lütfen tekrar konuşun...";
                box.style.color = "#FFCC00";
                return;
            }

            btn.innerText = "⏳";
            box.innerText = "AI Çeviriyor...";

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { 
                        "Authorization": "Bearer " + options.groqKey, 
                        "Content-Type": "application/json" 
                    },
                    body: JSON.stringify({
                        model: "llama3-8b-8192",
                        messages: [{ 
                            role: "user", 
                            content: "Translate this to " + options.targetLang + ". Result only: " + lastSpokenText 
                        }]
                    })
                });
                const data = await response.json();
                const result = data.choices[0].message.content;
                
                box.innerText = result;
                box.style.color = "#00FF00";
                // Çeviri yapıldıktan sonra eski metni temizle ki yeni cümleyi beklesin
                lastSpokenText = ""; 

            } catch (err) {
                box.innerText = "Çeviri hatası: " + err.message;
            } finally {
                btn.innerText = "ÇEVİR";
            }
        }

        async function leaveCall() {
            if (recognition) recognition.stop();
            localTracks.forEach(t => { t.stop(); t.close(); });
            await client.leave();
            if (window.AndroidBridge) window.AndroidBridge.closeCall();
            else window.location.href = "about:blank";
        }

        window.startCall = startCall;
        window.manualTranslate = manualTranslate;
        window.leaveCall = leaveCall;
    </script>
</body>
</html>
