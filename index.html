<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .v-box { flex: 1; width: 100%; position: relative; background: #111; border-bottom: 1px solid #333; }
        #remote-player, #local-player { width: 100%; height: 100%; object-fit: cover; }
        #controls, #overlay, #subtitle-box { display: none !important; }
    </style>
</head>
<body>
    <div class="v-box"><div id="remote-player"></div></div>
    <div class="v-box"><div id="local-player"></div></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const mode = urlParams.get("mode") || "global";
        const options = { appId: "fc667e2e21154602bba044359e5771a9", channel: urlParams.get("channel") || "test" };
        var client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
        var localTracks = { videoTrack: null, audioTrack: null };

        window.onload = () => { startCall(); };

        client.on("stream-message", (uid, data) => {
            const text = new TextDecoder().decode(data);
            if(window.AndroidBridge) window.AndroidBridge.updateSubtitle(text);
        });

        client.on("user-published", async (user, mediaType) => {
            await client.subscribe(user, mediaType);
            if (mediaType === "video") user.videoTrack.play("remote-player");
            if (mediaType === "audio") user.audioTrack.play();
        });

        async function startCall() {
            try {
                localTracks.audioTrack = await AgoraRTC.createMicrophoneAudioTrack();
                if (mode !== "audio") {
                    localTracks.videoTrack = await AgoraRTC.createCameraVideoTrack({ encoderConfig: "240p_1" });
                    localTracks.videoTrack.play("local-player");
                }
                await client.join(options.appId, options.channel, null, null);
                let tracks = [localTracks.audioTrack];
                if(localTracks.videoTrack) tracks.push(localTracks.videoTrack);
                await client.publish(tracks);
            } catch (e) { console.error(e); }
        }

        window.displayTranslation = (text) => {
            if (text && client) {
                client.sendStreamMessage(new TextEncoder().encode(text));
            }
        };

        window.switchCamera = async () => {
            if (localTracks.videoTrack) {
                const devs = await AgoraRTC.getCameras();
                const curr = localTracks.videoTrack.getMediaStreamTrack().settings().deviceId;
                const next = devs.find(d => d.deviceId !== curr) || devs[0];
                await localTracks.videoTrack.setDevice(next.deviceId);
            }
        };

        async function leaveCall() {
            await client.leave();
            if (window.AndroidBridge) window.AndroidBridge.closeCall();
        }
    </script>
</body>
</html>
