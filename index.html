<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TranslateTalk VIP</title>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        #remote-player { position: fixed; width: 100vw; height: 100vh; background: #000; z-index: 1; top:0; left:0; }
        #local-player { position: fixed; width: 100px; height: 140px; top: 20px; right: 20px; border-radius: 12px; border: 2px solid #fff; z-index: 10; background: #222; }
        #subtitle-box { position: fixed; bottom: 130px; left: 5%; width: 90%; text-align: center; background: rgba(0,0,0,0.8); padding: 12px; font-size: 18px; border-radius: 10px; color: #fff; z-index: 100; min-height: 25px; }
        #controls { position: fixed; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 40px; z-index: 200; }
        .btn-translate { width: 80px; height: 80px; background: #FF9800; border-radius: 50%; border: 4px solid #fff; color: white; font-weight: bold; cursor: pointer; }
        .btn-end { width: 70px; height: 70px; background: #FF3B30; border-radius: 50%; border: 4px solid #fff; color: white; font-size: 30px; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .join-btn { padding: 20px 50px; font-size: 22px; background: #28a745; color: white; border-radius: 50px; border: 4px solid #fff; }
    </style>
</head>
<body>
    <div id="overlay">
        <h2 id="status-textText">TranslateTalk VIP</h2>
        <button id="start-btn" class="join-btn" onclick="startCall()">GÖRÜŞMEYİ BAŞLAT</button>
    </div>
    
    <div id="remote-player"></div>
    <div id="local-player"></div>
    <div id="subtitle-box">Hazırlanıyor...</div>
    
    <div id="controls">
        <button id="trans-btn" class="btn-translate" onclick="manualTranslate()">ÇEVİR</button>
        <button class="btn-end" onclick="leaveCall()">✕</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const options = {
            appId: "fc667e2e21154602bba044359e5771a9",
            channel: urlParams.get("channel"),
            targetLang: urlParams.get("targetLang") || "English",
            groqKey: urlParams.get("gKey") || ""
        };

        let client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
        let localTracks = { videoTrack: null };
        let lastSpokenText = "";

        // ANDROID KÖPRÜLERİ
        window.receiveFromAndroid = function(text) {
            lastSpokenText = text;
            document.getElementById("subtitle-box").innerText = text;
            document.getElementById("subtitle-box").style.color = "#fff";
        };

        window.receivePartialFromAndroid = function(text) {
            document.getElementById("subtitle-box").innerText = "..." + text;
        };

        // AGORA MESAJ ALMA
        client.on("stream-message", (uid, data) => {
            const text = new TextDecoder().decode(data);
            const box = document.getElementById("subtitle-box");
            box.innerText = text;
            box.style.color = "#00FF00"; // Karşıdan gelen YEŞİL
        });

        client.on("user-published", async (user, mediaType) => {
            await client.subscribe(user, mediaType);
            if (mediaType === "video") user.videoTrack.play("remote-player");
            if (mediaType === "audio") user.audioTrack.play();
        });

        async function startCall() {
            const btn = document.getElementById("start-btn");
            btn.disabled = true;
            btn.innerText = "Bağlanıyor...";
            
            try {
                // Kamera aç
                localTracks.videoTrack = await AgoraRTC.createCameraVideoTrack({
                    encoderConfig: { width: 320, height: 240, frameRate: 15 } // Çok düşük ayar
                });

                await client.join(options.appId, options.channel, null, null);
                await client.publish(localTracks.videoTrack);
                
                localTracks.videoTrack.play("local-player");
                document.getElementById("overlay").style.display = "none";
                document.getElementById("subtitle-box").innerText = "Sisteme giriş yapıldı. Konuşabilirsiniz.";
            } catch (err) {
                alert("Bağlantı hatası: " + err.message);
                btn.disabled = false;
                btn.innerText = "GÖRÜŞMEYİ BAŞLAT";
            }
        }

        async function manualTranslate() {
    if (!lastSpokenText) return;
    const btn = document.getElementById("trans-btn");
    const box = document.getElementById("subtitle-box");
    
    // Google Gemini API Ayarları
    const apiKey = options.groqKey; // Android'den gelen anahtar
    const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;

    btn.innerText = "⏳";
    btn.disabled = true;

    try {
        const response = await fetch(endpoint, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                contents: [{
                    parts: [{
                        text: `Translate the following text to ${options.targetLang}. Provide ONLY the translated text, absolutely no preamble or explanations: "${lastSpokenText}"`
                    }]
                }],
                generationConfig: {
                    temperature: 0.1, // Daha net ve tutarlı çeviri için düşük tutuyoruz
                    maxOutputTokens: 200,
                }
            })
        });

        const data = await response.json();
        
        if (data.candidates && data.candidates[0].content.parts[0].text) {
            const translated = data.candidates[0].content.parts[0].text.trim();
            
            // Kendi ekranımda göster
            box.innerText = translated;
            box.style.color = "#00FF00"; // Çeviri geldiğinde yeşil yap

            // AGORA 4.X ÜZERİNDEN KARŞI TARAFA GÖNDER
            const msg = new TextEncoder().encode(translated);
            await client.sendStreamMessage(msg);
            console.log("Gemini Çevirisi Gönderildi:", translated);
        } else {
            throw new Error("Çeviri içeriği alınamadı.");
        }

    } catch (e) { 
        console.error("Gemini Hatası:", e);
        box.innerText = "Çeviri Hatası: API Limit veya Bağlantı";
        box.style.color = "#ff0000";
    } finally { 
        btn.innerText = "ÇEVİR"; 
        btn.disabled = false;
    }
}

        async function leaveCall() {
            if (localTracks.videoTrack) { localTracks.videoTrack.stop(); localTracks.videoTrack.close(); }
            await client.leave();
            if (window.AndroidBridge) window.AndroidBridge.closeCall();
        }
    </script>
</body>
</html>
