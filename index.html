<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TranslateTalk VIP</title>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        #remote-player { width: 100vw; height: 100vh; background: #000; display: flex; align-items: center; justify-content: center; }
        #local-player { 
            width: 100px; height: 140px; position: absolute; top: 20px; right: 20px; 
            border-radius: 12px; border: 2px solid #fff; z-index: 10; background: #222;
        }
        #subtitle-box { 
            position: absolute; bottom: 120px; left: 5%; width: 90%; 
            text-align: center; background: rgba(0,0,0,0.7); padding: 12px; 
            font-size: 18px; border-radius: 10px; color: #00FF00; font-weight: bold; z-index: 20;
        }
        #status-bar { position: absolute; top: 10px; left: 10px; font-size: 12px; color: #777; z-index: 30; }
        #controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; z-index: 100; }
        .btn-end { width: 65px; height: 65px; background: #FF3B30; border-radius: 50%; border: none; color: white; font-size: 30px; }
    </style>
</head>
<body>

    <div id="status-bar">Bağlanıyor...</div>
    <div id="remote-player">Kamera bekleniyor...</div>
    <div id="local-player"></div>
    <div id="subtitle-box">...</div>

    <div id="controls"><button class="btn-end" onclick="leaveCall()">✕</button></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const options = {
            appId: "fc667e2e21154602bba044359e5771a9",
            channel: urlParams.get("channel")?.trim() || "test", // Boşlukları temizle
            myLang: urlParams.get("myLang") || "tr-TR",
            targetLang: urlParams.get("targetLang") || "English",
            groqKey: urlParams.get("gKey") || ""
        };

        let client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
        let localTracks = { videoTrack: null, audioTrack: null };

        // 1. Dinleyiciyi sabitle
        client.on("user-published", async (user, mediaType) => {
            await client.subscribe(user, mediaType);
            if (mediaType === "video") {
                document.getElementById("remote-player").innerHTML = "";
                user.videoTrack.play("remote-player");
                updateStatus("Canlı yayın bağlandı!");
            }
            if (mediaType === "audio") {
                user.audioTrack.play();
            }
        });

        async function startCall() {
            try {
                updateStatus("Oda: " + options.channel + " | Cihazlar aranıyor...");
                
                // Cihazları aç
                const [audioTrack, videoTrack] = await AgoraRTC.createMicrophoneAndCameraTracks(
                    {}, { encoderConfig: "240p_1" } // Çözünürlüğü iyice düşürdük ki tablet zorlanmasın
                );
                localTracks.audioTrack = audioTrack;
                localTracks.videoTrack = videoTrack;

                // Kanala Katıl
                await client.join(options.appId, options.channel, null, null);
                
                // Görüntüleri Başlat
                localTracks.videoTrack.play("local-player");
                await client.publish([localTracks.audioTrack, localTracks.videoTrack]);

                updateStatus("BAĞLANTI TAMAM. Oda: " + options.channel);
                
                // 2. SES TANIMAYI 3 SANİYE SONRA BAŞLAT (Çakışmayı önler)
                setTimeout(() => {
                    startRecognition();
                }, 3000);

            } catch (err) {
                updateStatus("HATA: " + err.message);
                console.error(err);
            }
        }

        function updateStatus(msg) {
            document.getElementById("status-bar").innerText = msg;
        }

        function startRecognition() {
            const sr = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!sr) return;
            const rec = new sr();
            rec.lang = options.myLang;
            rec.continuous = true;
            rec.onresult = async (e) => {
                const text = e.results[e.results.length - 1][0].transcript;
                if(text.trim()) translateWithGroq(text);
            };
            rec.onerror = (err) => { if(err.error !== 'no-speech') rec.stop(); };
            rec.onend = () => rec.start();
            rec.start();
        }

        async function translateWithGroq(text) {
            if (!options.groqKey) return;
            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${options.groqKey}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama3-8b-8192",
                        messages: [{ role: "user", content: `Translate to ${options.targetLang}, only result: ${text}` }]
                    })
                });
                const data = await response.json();
                document.getElementById("subtitle-box").innerText = data.choices[0].message.content;
            } catch (err) {}
        }

        async function leaveCall() {
            if (localTracks.videoTrack) { localTracks.videoTrack.stop(); localTracks.videoTrack.close(); }
            if (localTracks.audioTrack) { localTracks.audioTrack.stop(); localTracks.audioTrack.close(); }
            await client.leave();
            if (window.AndroidBridge) window.AndroidBridge.closeCall();
            else window.location.href = "about:blank";
        }

        window.onload = startCall;
    </script>
</body>
</html>
