<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TranslateTalk VIP</title>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        #remote-player { position: fixed; width: 100vw; height: 100vh; z-index: 1; }
        #local-player { position: fixed; width: 100px; height: 140px; top: 20px; right: 20px; border-radius: 12px; border: 2px solid #fff; z-index: 10; }
        /* HTML Butonlarını ve Gereksiz Kutuları Gizle (Native Kullanıyoruz) */
        #controls, #overlay, #subtitle-box { display: none !important; }
    </style>
</head>
<body>
    <div id="remote-player"></div>
    <div id="local-player"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const options = { appId: "fc667e2e21154602bba044359e5771a9", channel: urlParams.get("channel") || "test" };
        var client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
        var localTracks = { videoTrack: null, audioTrack: null };

        // OTOMATİK BAŞLAT
        window.onload = () => { setTimeout(() => { startCall(); }, 500); };

        client.on("stream-message", (uid, data) => {
            const text = new TextDecoder().decode(data);
            // Karşıdan gelen mesajı Android tarafına bildir (Altyazı için)
            if(window.AndroidBridge) window.AndroidBridge.requestTranslation(text); 
        });

        client.on("user-published", async (user, mediaType) => {
            await client.subscribe(user, mediaType);
            if (mediaType === "video") user.videoTrack.play("remote-player");
            if (mediaType === "audio") user.audioTrack.play();
        });

        async function startCall() {
            try {
                localTracks.audioTrack = await AgoraRTC.createMicrophoneAudioTrack();
                localTracks.videoTrack = await AgoraRTC.createCameraVideoTrack({ encoderConfig: "240p_1" });
                await client.join(options.appId, options.channel, null, null);
                localTracks.videoTrack.play("local-player");
                await client.publish([localTracks.audioTrack, localTracks.videoTrack]);
            } catch (e) { console.error(e); }
        }

        window.displayTranslation = function(text) {
            // Android'den gelen çeviriyi karşıya fırlat
            client.sendStreamMessage(new TextEncoder().encode(text));
            if (localTracks.audioTrack) localTracks.audioTrack.setEnabled(true);
        };

        window.switchCamera = async function() {
            if (localTracks.videoTrack) {
                const devs = await AgoraRTC.getCameras();
                if(devs.length > 1) {
                    await localTracks.videoTrack.setDevice(localTracks.videoTrack.getTrackLabel() === devs[0].label ? devs[1].deviceId : devs[0].deviceId);
                }
            }
        };

        async function leaveCall() {
            if (localTracks.videoTrack) localTracks.videoTrack.close();
            if (localTracks.audioTrack) localTracks.audioTrack.close();
            await client.leave();
            if (window.AndroidBridge) window.AndroidBridge.closeCall();
        }
    </script>
</body>
</html>
