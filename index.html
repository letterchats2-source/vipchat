<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TranslateTalk VIP</title>
    <!-- Agora SDK 4.x -->
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        
        /* Arka plan video katmanı */
        #remote-player { position: fixed; width: 100vw; height: 100vh; background: #111; z-index: 1; top:0; left:0; }
        
        /* Küçük yerel kamera katmanı */
        #local-player { position: fixed; width: 110px; height: 150px; top: 20px; right: 20px; border-radius: 15px; border: 2px solid rgba(255,255,255,0.5); z-index: 10; background: #222; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        
        /* Altyazı Kutusu - VIP Tasarım */
        #subtitle-box { 
            position: fixed; 
            bottom: 130px; 
            left: 5%; 
            width: 84%; 
            text-align: center; 
            background: rgba(0,0,0,0.6); 
            backdrop-filter: blur(10px); 
            padding: 15px; 
            font-size: 19px; 
            border-radius: 15px; 
            color: #fff; 
            z-index: 100; 
            min-height: 30px; 
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s ease;
        }

        #controls { position: fixed; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 30px; z-index: 200; }
        
        .btn-translate { 
            width: 85px; height: 85px; 
            background: linear-gradient(135deg, #FF9800, #F57C00); 
            border-radius: 50%; border: 3px solid #fff; 
            color: white; font-weight: bold; font-size: 16px;
            cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            -webkit-tap-highlight-color: transparent;
        }

        .btn-end { 
            width: 75px; height: 75px; 
            background: #FF3B30; border-radius: 50%; 
            border: 3px solid #fff; color: white; font-size: 35px;
            display: flex; align-items: center; justify-content: center;
        }

        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .join-btn { padding: 18px 40px; font-size: 20px; background: #28a745; color: white; border-radius: 50px; cursor: pointer; border: none; font-weight: bold; }
    </style>
</head>
<body>
    <div id="overlay"><button class="join-btn" onclick="startCall()">GÖRÜŞMEYİ BAŞLAT</button></div>
    <div id="remote-player"></div>
    <div id="local-player"></div>
    <div id="subtitle-box">Bağlanıyor...</div>
    <div id="controls">
        <button id="trans-btn" class="btn-translate" onclick="manualTranslate()">ÇEVİR</button>
        <button class="btn-end" onclick="leaveCall()">✕</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const options = {
            appId: "fc667e2e21154602bba044359e5771a9",
            channel: urlParams.get("channel"),
            targetLang: urlParams.get("targetLang") || "English",
            groqKey: urlParams.get("gKey") || ""
        };

        let client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
        let localTracks = { videoTrack: null };
        let lastSpokenText = "";

        // 1. ANDROID'DEN GELEN METİN KÖPRÜSÜ (Partial ve Final)
        window.receiveFromAndroid = function(text) {
            lastSpokenText = text;
            const box = document.getElementById("subtitle-box");
            box.innerText = text;
            box.style.color = "#FFFFFF"; // Final metin beyaz
        };

        window.receivePartialFromAndroid = function(text) {
            const box = document.getElementById("subtitle-box");
            box.innerText = "..." + text;
            box.style.color = "#AAAAAA"; // Konuşma devam ederken gri
        };

        // 2. AGORA 4.X - DATASTREAM (MESAJ ALMA)
        client.on("stream-message", (uid, data) => {
            const text = new TextDecoder().decode(data);
            const box = document.getElementById("subtitle-box");
            box.innerText = text;
            box.style.color = "#00FF00"; // Karşıdan gelen çeviri YEŞİL
        });

        client.on("user-published", async (user, mediaType) => {
            await client.subscribe(user, mediaType);
            if (mediaType === "video") {
                user.videoTrack.play("remote-player");
            }
            if (mediaType === "audio") {
                user.audioTrack.play();
            }
        });

        async function startCall() {
            document.getElementById("overlay").style.display = "none";
            try {
                // Agora 4.x Join
                await client.join(options.appId, options.channel, null, null);
                
                // Kamera açma (Mikrofon kapalı - Android Native'de çünkü)
                localTracks.videoTrack = await AgoraRTC.createCameraVideoTrack({
                    encoderConfig: "240p_1" // Infinix ve Tablet stabilitesi için düşük çözünürlük
                });

                localTracks.videoTrack.play("local-player");
                await client.publish(localTracks.videoTrack);
                
                document.getElementById("subtitle-box").innerText = "Hazır. Konuşun ve ÇEVİR'e basın.";
            } catch (err) {
                console.error("Giriş Hatası:", err);
                document.getElementById("subtitle-box").innerText = "Bağlantı hatası!";
            }
        }

        // 3. GROQ ÇEVİRİ VE AGORA 4.X MESAJ GÖNDERME
        async function manualTranslate() {
            if (!lastSpokenText) return;
            const btn = document.getElementById("trans-btn");
            const box = document.getElementById("subtitle-box");
            const originalText = lastSpokenText; // Çevrilecek metni sabitle
            
            btn.innerText = "⏳";
            btn.disabled = true;

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { 
                        "Authorization": "Bearer " + options.groqKey, 
                        "Content-Type": "application/json" 
                    },
                    body: JSON.stringify({
                        model: "llama3-8b-8192",
                        messages: [{ 
                            role: "user", 
                            content: "Translate this to " + options.targetLang + ". Provide ONLY the translated text, no explanations: " + originalText 
                        }]
                    })
                });

                const data = await response.json();
                if(data.choices && data.choices[0]) {
                    const translated = data.choices[0].message.content;
                    
                    // Kendi ekranımda göster
                    box.innerText = translated;
                    box.style.color = "#00FF00";

                    // 4. AGORA 4.X - DATASTREAM (MESAJ GÖNDERME)
                    // 4.x sürümünde streamId'ye gerek yoktur, doğrudan client üzerinden gönderilir.
                    const msg = new TextEncoder().encode(translated);
                    await client.sendStreamMessage(msg); 
                }

            } catch (e) { 
                console.error("Çeviri Hatası:", e);
                box.innerText = "Çeviri hatası!"; 
            } finally { 
                btn.innerText = "ÇEVİR"; 
                btn.disabled = false;
            }
        }

        async function leaveCall() {
            if (localTracks.videoTrack) {
                localTracks.videoTrack.stop();
                localTracks.videoTrack.close();
            }
            await client.leave();
            // Android'e görüşmenin bittiğini bildir
            if (window.Android) {
                window.Android.finishCall(); 
            }
        }
    </script>
</body>
</html>
