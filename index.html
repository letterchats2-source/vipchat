<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TranslateTalk VIP</title>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { margin: 0; padding: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        #remote-player { position: fixed; width: 100vw; height: 100vh; background: #000; z-index: 1; top:0; left:0; }
        #local-player { position: fixed; width: 100px; height: 140px; top: 20px; right: 20px; border-radius: 12px; border: 2px solid #fff; z-index: 10; background: #222; }
        #subtitle-box { position: fixed; bottom: 130px; left: 5%; width: 84%; text-align: center; background: rgba(0,0,0,0.8); padding: 15px; font-size: 18px; border-radius: 10px; color: #fff; z-index: 100; min-height: 25px; display: none; }
        #controls { position: fixed; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 40px; z-index: 200; }
        .btn-translate { width: 80px; height: 80px; background: #FF9800; border-radius: 50%; border: 4px solid #fff; color: white; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px;}
        .btn-end { width: 75px; height: 75px; background: #FF3B30; border-radius: 50%; border: 4px solid #fff; color: white; font-size: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer;}
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .join-btn { padding: 20px 50px; font-size: 22px; background: #28a745; color: white; border-radius: 10px; cursor: pointer; border: none; font-weight: bold; }
    </style>
</head>
<body>
    <div id="overlay"><button class="join-btn" onclick="startCall()">GÖRÜŞMEYİ BAŞLAT</button></div>
    <div id="remote-player"></div>
    <div id="local-player"></div>
    <div id="subtitle-box">Metin bekleniyor...</div>
    <div id="controls">
        <button id="trans-btn" class="btn-translate" onclick="manualTranslate()">KONUŞ<br>& ÇEVİR</button>
        <button class="btn-end" onclick="leaveCall()"><i class="fa-solid fa-phone-slash"></i></button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const mode = urlParams.get("mode") || "global"; 
        const options = { appId: "fc667e2e21154602bba044359e5771a9", channel: urlParams.get("channel") || "test" };
        
        var client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
        var localTracks = { videoTrack: null, audioTrack: null };
        var lastSpokenText = "";

        document.getElementById("overlay").style.display = "none"; // Giriş butonunu tamamen kaldır
        
        if (mode !== "global") {
            // Normal Görüşme: Çeviri butonu ve Altyazı kutusunu gizle
            document.getElementById("trans-btn").style.display = "none";
            document.getElementById("subtitle-box").style.display = "none";
        } else {
            // Global Görüşme: Altyazı kutusunu ve Butonu göster
            document.getElementById("subtitle-box").style.display = "block";
            document.getElementById("trans-btn").style.display = "flex";
        }

        // Her durumda görüşmeyi 500ms sonra otomatik başlat (Tıklama bekleme!)
        setTimeout(() => { 
            startCall(); 
        }, 500);

        client.on("stream-message", (uid, data) => {
            const text = new TextDecoder().decode(data);
            const box = document.getElementById("subtitle-box");
            box.innerText = text; box.style.color = "#00FF00";
        });

        client.on("user-published", async (user, mediaType) => {
            await client.subscribe(user, mediaType);
            if (mediaType === "video") user.videoTrack.play("remote-player");
            if (mediaType === "audio") user.audioTrack.play();
        });

        async function startCall() {
            document.getElementById("overlay").style.display = "none";
            try {
                localTracks.audioTrack = await AgoraRTC.createMicrophoneAudioTrack();
                await client.join(options.appId, options.channel, null, null);
                if (mode !== "audio") {
                    localTracks.videoTrack = await AgoraRTC.createCameraVideoTrack({ encoderConfig: "240p_1" });
                    localTracks.videoTrack.play("local-player");
                    await client.publish([localTracks.audioTrack, localTracks.videoTrack]);
                } else {
                    await client.publish([localTracks.audioTrack]);
                }
            } catch (e) { console.log(e); }
        }

        // --- MANUEL ÇEVİRİ BUTONU MANTIĞI ---
        function manualTranslate() {
            const btn = document.getElementById("trans-btn");
            btn.innerText = "⏳";
            
            // 1. Agora Mikrofonunu Kapat (Boşa Çıkar)
            if (localTracks.audioTrack) {
                localTracks.audioTrack.setEnabled(false);
            }

            // 2. Android STT'yi Başlat
            if (window.AndroidBridge) {
                window.AndroidBridge.startManualSTT();
            }
            
            // 3. 5 saniye sonra Agora mikrofonunu geri aç (Güvenlik için)
            setTimeout(() => {
                if (localTracks.audioTrack) localTracks.audioTrack.setEnabled(true);
                btn.innerText = "KONUŞ\n& ÇEVİR";
            }, 5000);
        }

        window.receiveFromAndroid = function(text) {
            lastSpokenText = text;
            document.getElementById("subtitle-box").innerText = "Duyulan: " + text;
            // Metin gelince hemen çeviriye gönder
            if (window.AndroidBridge) window.AndroidBridge.requestTranslation(text);
        };

        window.displayTranslation = function(translatedText) {
            const box = document.getElementById("subtitle-box");
            box.innerText = translatedText;
            box.style.color = "#00FF00";
            // Agora üzerinden karşıya gönder
            client.sendStreamMessage(new TextEncoder().encode(translatedText));
            // Mikrofonu geri aç
            if (localTracks.audioTrack) localTracks.audioTrack.setEnabled(true);
        };

        async function leaveCall() {
            if (localTracks.videoTrack) localTracks.videoTrack.close();
            if (localTracks.audioTrack) localTracks.audioTrack.close();
            await client.leave();
            if (window.AndroidBridge) window.AndroidBridge.closeCall();
        }
    </script>
</body>
</html>
