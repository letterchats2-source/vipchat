<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TranslateTalk VIP</title>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        #remote-player { position: absolute; width: 100vw; height: 100vh; background: #111; z-index: 1; }
        #local-player { width: 100px; height: 140px; position: absolute; top: 15px; right: 15px; border-radius: 12px; border: 2px solid #fff; z-index: 100; background: #222; }
        #subtitle-box { position: absolute; bottom: 130px; left: 5%; width: 90%; text-align: center; background: rgba(0,0,0,0.8); padding: 15px; font-size: 19px; border-radius: 12px; color: #fff; z-index: 999; min-height: 30px; border: 1px solid rgba(255,255,255,0.2); }
        #controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 40px; z-index: 1000; }
        .btn-translate { width: 80px; height: 80px; background: #FF9800; border-radius: 50%; border: 4px solid #fff; color: white; font-weight: bold; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .btn-end { width: 70px; height: 70px; background: #FF3B30; border-radius: 50%; border: 4px solid #fff; color: white; font-size: 30px; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .join-btn { padding: 20px 50px; font-size: 22px; background: #28a745; color: white; border-radius: 50px; cursor: pointer; font-weight: bold; border: 4px solid #fff; }
        #status-bar { position: absolute; top: 10px; left: 10px; font-size: 11px; color: #00FF00; z-index: 1001; }
    </style>
</head>
<body>
    <div id="overlay"><button class="join-btn" onclick="startCall()">GÖRÜŞMEYİ BAŞLAT</button></div>
    <div id="status-bar">Bağlantı Bekleniyor...</div>
    <div id="remote-player"></div>
    <div id="local-player"></div>
    <div id="subtitle-box">Konuşmanız Android tarafından dinleniyor...</div>
    <div id="controls">
        <button id="trans-btn" class="btn-translate" onclick="manualTranslate()">ÇEVİR</button>
        <button class="btn-end" onclick="leaveCall()">✕</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const mode = urlParams.get("mode") || "global";
        const options = {
            appId: "fc667e2e21154602bba044359e5771a9",
            channel: urlParams.get("channel") || "test",
            targetLang: urlParams.get("targetLang") || "English",
            groqKey: urlParams.get("gKey") || ""
        };

        let client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
        let localTracks = { videoTrack: null };
        let lastSpokenText = "";

        client.on("user-published", async (user, mediaType) => {
            await client.subscribe(user, mediaType);
            if (mediaType === "video") user.videoTrack.play("remote-player");
            if (mediaType === "audio") user.audioTrack.play();
        });

        async function startCall() {
            document.getElementById("overlay").style.display = "none";
            updateStatus("Bağlanıyor...");
            try {
                // SADECE KAMERAYI AÇIYORUZ (Mikrofonu Android katmanında hallettik)
                localTracks.videoTrack = await AgoraRTC.createCameraVideoTrack({encoderConfig: "240p_1"});
                await client.join(options.appId, options.channel, null, null);
                localTracks.videoTrack.play("local-player");
                await client.publish(localTracks.videoTrack);
                updateStatus("Canlı Yayın Aktif 🟢");
            } catch (err) {
                updateStatus("Hata: " + err.message);
                // Görüntü açılmazsa sesle devam et
                await client.join(options.appId, options.channel, null, null);
                updateStatus("Sadece Ses Modu Aktif 🔊");
            }
        }

        window.receiveFromAndroid = function(text) {
            lastSpokenText = text;
            document.getElementById("subtitle-box").innerText = "Duyulan: " + text;
        };

        async function manualTranslate() {
            if (!lastSpokenText) return;
            const btn = document.getElementById("trans-btn");
            const box = document.getElementById("subtitle-box");
            btn.innerText = "⏳";
            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": "Bearer " + options.groqKey, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama3-8b-8192",
                        messages: [{ role: "user", content: "Translate to " + options.targetLang + ": " + lastSpokenText }]
                    })
                });
                const data = await res.json();
                box.innerText = data.choices[0].message.content;
                box.style.color = "#00FF00";
            } catch (e) { box.innerText = "Hata!"; }
            finally { btn.innerText = "ÇEVİR"; }
        }

        function updateStatus(m) { document.getElementById("status-bar").innerText = m; }
        
        async function leaveCall() {
            if (localTracks.videoTrack) { localTracks.videoTrack.stop(); localTracks.videoTrack.close(); }
            await client.leave();
            if (window.AndroidBridge) window.AndroidBridge.closeCall();
        }
    </script>
</body>
</html>
