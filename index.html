<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TranslateTalk VIP</title>
    <!-- Agora SDK 4.x -->
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; color: white; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; overflow: hidden; }
        
        /* Video Katmanları */
        #remote-player { position: fixed; width: 100vw; height: 100vh; background: #111; z-index: 1; top:0; left:0; }
        #local-player { position: fixed; width: 110px; height: 150px; top: 20px; right: 20px; border-radius: 12px; border: 2px solid #fff; z-index: 10; background: #222; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        
        /* Altyazı Kutusu - VIP Tasarım */
        #subtitle-box { 
            position: fixed; bottom: 130px; left: 5%; width: 84%; 
            text-align: center; background: rgba(0,0,0,0.6); 
            backdrop-filter: blur(8px); padding: 15px; font-size: 19px; 
            border-radius: 15px; color: #fff; z-index: 100; 
            min-height: 30px; border: 1px solid rgba(255,255,255,0.2);
            word-wrap: break-word;
        }

        /* Kontrol Butonları */
        #controls { position: fixed; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 40px; z-index: 200; }
        
        .btn-translate { 
            width: 85px; height: 85px; background: linear-gradient(135deg, #FF9800, #F57C00); 
            border-radius: 50%; border: 4px solid #fff; color: white; 
            font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .btn-end { 
            width: 75px; height: 75px; background: #FF3B30; border-radius: 50%; 
            border: 4px solid #fff; color: white; font-size: 30px; 
            display: flex; align-items: center; justify-content: center;
        }

        /* Giriş Ekranı */
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .join-btn { padding: 20px 50px; font-size: 22px; background: #28a745; color: white; border-radius: 50px; cursor: pointer; border: 4px solid #fff; font-weight: bold; }
        #status-text { margin-bottom: 20px; font-size: 18px; color: #aaa; }
    </style>
</head>
<body>
    <div id="overlay">
        <div id="status-text">TranslateTalk VIP Sistemine Hoşgeldiniz</div>
        <button class="join-btn" onclick="startCall()">GÖRÜŞMEYİ BAŞLAT</button>
    </div>

    <div id="remote-player"></div>
    <div id="local-player"></div>
    <div id="subtitle-box">Bağlantı bekleniyor...</div>

    <div id="controls">
        <button id="trans-btn" class="btn-translate" onclick="manualTranslate()">ÇEVİR</button>
        <button class="btn-end" onclick="leaveCall()">✕</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const options = {
            appId: "fc667e2e21154602bba044359e5771a9",
            channel: urlParams.get("channel"),
            targetLang: urlParams.get("targetLang") || "English"
        };

        let client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
        let localTracks = { videoTrack: null };
        let lastSpokenText = "";

        // 1. AGORA: KARŞIDAN GELEN MESAJI GÖSTER (YEŞİL)
        client.on("stream-message", (uid, data) => {
            const text = new TextDecoder().decode(data);
            const box = document.getElementById("subtitle-box");
            box.innerText = text;
            box.style.color = "#00FF00"; // Karşıdan gelen çeviri her zaman YEŞİL
        });

        // 2. AGORA: KULLANICI YAYINA GİRDİĞİNDE
        client.on("user-published", async (user, mediaType) => {
            await client.subscribe(user, mediaType);
            if (mediaType === "video") {
                user.videoTrack.play("remote-player");
            }
            if (mediaType === "audio") {
                user.audioTrack.play();
            }
        });

        // 3. GÖRÜŞMEYİ BAŞLAT FONKSİYONU
        async function startCall() {
            document.getElementById("overlay").style.display = "none";
            const box = document.getElementById("subtitle-box");
            
            try {
                // Kamera aç (Low-res for stability)
                localTracks.videoTrack = await AgoraRTC.createCameraVideoTrack({
                    encoderConfig: "240p_1"
                });

                await client.join(options.appId, options.channel, null, null);
                await client.publish(localTracks.videoTrack);
                
                localTracks.videoTrack.play("local-player");
                box.innerText = "Bağlantı başarılı. Konuşmaya başlayabilirsiniz.";
            } catch (err) {
                console.error("Giriş Hatası:", err);
                alert("Bağlantı Hatası: " + err.message);
            }
        }

        // 4. ANDROID NATIVE'DEN GELEN SES METİNLERİ
        window.receiveFromAndroid = function(text) {
            lastSpokenText = text;
            const box = document.getElementById("subtitle-box");
            box.innerText = text;
            box.style.color = "#FFFFFF"; // Duyulan metin beyaz
        };

        window.receivePartialFromAndroid = function(text) {
            const box = document.getElementById("subtitle-box");
            box.innerText = "..." + text;
            box.style.color = "#CCCCCC"; // Konuşurken gri
        };

        // 5. ÇEVİRİ BUTONU (Kotlin'deki Gemini Motorunu Tetikler)
        function manualTranslate() {
            if (!lastSpokenText) return;
            document.getElementById("trans-btn").innerText = "⏳";
            
            if (window.AndroidBridge && window.AndroidBridge.requestTranslation) {
                window.AndroidBridge.requestTranslation(lastSpokenText);
            } else {
                alert("Sistem köprüsü kurulamadı!");
            }
        }

        // 6. KOTLIN'DEN GELEN ÇEVİRİ SONUCUNU GÖSTER VE KARŞIYA GÖNDER
        // async ekledik çünkü await client.sendStreamMessage kullanacağız
        window.displayTranslation = async function(translatedText) {
            const box = document.getElementById("subtitle-box");
            const btn = document.getElementById("trans-btn");
            
            // Metni temizle (Tırnak hatalarını önlemek için)
            const cleanText = translatedText.replace(/[']/g, "").trim();
            
            box.innerText = cleanText;
            box.style.color = "#00FF00"; // Başarılı çeviri YEŞİL
            btn.innerText = "ÇEVİR";

            // Agora DataStream üzerinden karşı tarafa gönder
            try {
                const msg = new TextEncoder().encode(cleanText);
                await client.sendStreamMessage(msg);
            } catch (e) {
                console.error("Mesaj karşıya iletilemedi:", e);
            }
        };

        async function leaveCall() {
            if (localTracks.videoTrack) { 
                localTracks.videoTrack.stop(); 
                localTracks.videoTrack.close(); 
            }
            await client.leave();
            if (window.AndroidBridge) window.AndroidBridge.closeCall();
        }
    </script>
</body>
</html>
