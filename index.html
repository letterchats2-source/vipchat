<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TranslateTalk VIP</title>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>
    <style>
        body { margin: 0; background: transparent; overflow: hidden; }
        #remote-player { position: fixed; width: 100vw; height: 100vh; z-index: 1; top:0; left:0; background: #000; }
        #local-player { position: fixed; width: 100px; height: 140px; top: 20px; right: 20px; border-radius: 12px; border: 2px solid #fff; z-index: 10; background: #222; }
        /* HTML butonlarını tamamen yok et */
        #controls, #overlay, #subtitle-box { display: none !important; }
    </style>
</head>
<body>
    <div id="remote-player"></div>
    <div id="local-player"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const options = { appId: "fc667e2e21154602bba044359e5771a9", channel: urlParams.get("channel") || "test" };
        var client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
        var localTracks = { videoTrack: null, audioTrack: null };

        // Sayfa yüklenir yüklenmez otomatik başlat
        window.onload = () => { startCall(); };

        client.on("user-published", async (user, mediaType) => {
            await client.subscribe(user, mediaType);
            if (mediaType === "video") user.videoTrack.play("remote-player");
            if (mediaType === "audio") user.audioTrack.play();
        });

        async function startCall() {
            try {
                // ÖNEMLİ: Mikrofonu alırken hata oluşursa videoyu yine de başlat
                try {
                    localTracks.audioTrack = await AgoraRTC.createMicrophoneAudioTrack();
                } catch(e) { console.log("Mikrofon hatası, sadece video deneniyor"); }
                
                localTracks.videoTrack = await AgoraRTC.createCameraVideoTrack({ encoderConfig: "240p_1" });
                await client.join(options.appId, options.channel, null, null);
                localTracks.videoTrack.play("local-player");
                
                let tracks = [];
                if(localTracks.audioTrack) tracks.push(localTracks.audioTrack);
                if(localTracks.videoTrack) tracks.push(localTracks.videoTrack);
                await client.publish(tracks);
            } catch (e) { console.error("StartCall Hatası:", e); }
        }

        window.displayTranslation = function(text) {
            client.sendStreamMessage(new TextEncoder().encode(text));
        };

        window.switchCamera = async function() {
            if (localTracks.videoTrack) {
                const devs = await AgoraRTC.getCameras();
                await localTracks.videoTrack.setDevice(devs[1].deviceId);
            }
        };

        async function leaveCall() {
            if (localTracks.videoTrack) localTracks.videoTrack.close();
            if (localTracks.audioTrack) localTracks.audioTrack.close();
            await client.leave();
            if (window.AndroidBridge) window.AndroidBridge.closeCall();
        }
    </script>
</body>
</html>
