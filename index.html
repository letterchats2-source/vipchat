<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TranslateTalk VIP</title>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        #remote-player { width: 100vw; height: 100vh; background: #000; }
        #local-player { width: 100px; height: 140px; position: absolute; top: 20px; right: 20px; border-radius: 12px; border: 2px solid #fff; z-index: 100; }
        
        #subtitle-box { 
            position: absolute; bottom: 140px; left: 5%; width: 90%; 
            text-align: center; background: rgba(0,0,0,0.8); padding: 15px; 
            font-size: 18px; border-radius: 10px; color: #00FF00; z-index: 999;
        }

        #controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 30px; z-index: 1000; }
        
        /* Çeviri Tetikleme Butonu */
        .btn-translate { 
            width: 70px; height: 70px; background: #FF9800; border-radius: 50%; 
            border: 4px solid #fff; color: white; font-weight: bold; cursor: pointer;
        }
        .btn-end { width: 70px; height: 70px; background: #FF3B30; border-radius: 50%; border: 4px solid #fff; color: white; font-size: 30px; }
        
        #status { position: absolute; top: 10px; left: 10px; font-size: 12px; z-index: 1000; color: #aaa; }
    </style>
</head>
<body>

    <div id="status">Hazırlanıyor...</div>
    <div id="remote-player"></div>
    <div id="local-player"></div>
    <div id="subtitle-box">Konuşun ve 'ÇEVİR'e basın...</div>

    <div id="controls">
        <!-- Sadece GLOBAL modda görünen çeviri butonu -->
        <button id="trans-btn" class="btn-translate" onclick="manualTranslate()">ÇEVİR</button>
        <button class="btn-end" onclick="leaveCall()">✕</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const mode = urlParams.get("mode") || "global"; // "audio", "video", "global"
        const options = {
            appId: "fc667e2e21154602bba044359e5771a9",
            channel: urlParams.get("channel"),
            myLang: urlParams.get("myLang") || "tr-TR",
            targetLang: urlParams.get("targetLang") || "English",
            groqKey: urlParams.get("gKey") || ""
        };

        let client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
        let localTracks = [];
        let lastSpokenText = ""; // En son yakalanan konuşma

        // Mod ayarları
        if (mode === "audio") document.getElementById("local-player").style.display = "none";
        if (mode !== "global") {
            document.getElementById("subtitle-box").style.display = "none";
            document.getElementById("trans-btn").style.display = "none";
        }

        client.on("user-published", async (user, mediaType) => {
            await client.subscribe(user, mediaType);
            if (mediaType === "video" && mode !== "audio") user.videoTrack.play("remote-player");
            if (mediaType === "audio") user.audioTrack.play();
        });

        async function startCall() {
            try {
                const tracks = await AgoraRTC.createMicrophoneAndCameraTracks({}, {encoderConfig: "240p_1"});
                localTracks = tracks;
                
                await client.join(options.appId, options.channel, null, null);
                
                if (mode !== "audio") localTracks[1].play("local-player");
                
                // Moduna göre yayını başlat
                if (mode === "audio") await client.publish(localTracks[0]);
                else await client.publish(localTracks);

                if (mode === "global") startSpeechLogic();
                
                document.getElementById("status").innerText = "MOD: " + mode.toUpperCase();
            } catch (e) { alert("Hata: " + e.message); }
        }

        // --- SESİ SÜREKLİ DİNLE AMA ÇEVİRME ---
        function startSpeechLogic() {
            const sr = window.SpeechRecognition || window.webkitSpeechRecognition;
            const rec = new sr();
            rec.lang = options.myLang;
            rec.continuous = true;
            rec.interimResults = true;

            rec.onresult = (e) => {
                lastSpokenText = e.results[e.results.length - 1][0].transcript;
                document.getElementById("subtitle-box").innerText = "Duyulan: " + lastSpokenText;
            };
            rec.onend = () => rec.start();
            rec.start();
        }

        // --- BUTONA BASILDIĞINDA ÇEVİRİYE GÖNDER ---
        async function manualTranslate() {
            if (!lastSpokenText) return;
            document.getElementById("subtitle-box").innerText = "VIP Çeviri yapılıyor...";
            
            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${options.groqKey}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama3-8b-8192",
                        messages: [{ role: "user", content: `Translate to ${options.targetLang}: ${lastSpokenText}` }]
                    })
                });
                const data = await res.json();
                const result = data.choices[0].message.content;
                
                // Ekranlara yazdır
                document.getElementById("subtitle-box").innerText = result;
                
                // NOT: Burada Firebase'e kaydedip karşıya gönderme mantığını tetikleyebilirsin.
            } catch (err) { document.getElementById("subtitle-box").innerText = "Hata oluştu."; }
        }

        async function leaveCall() {
            localTracks.forEach(t => { t.stop(); t.close(); });
            await client.leave();
            if (window.AndroidBridge) window.AndroidBridge.closeCall();
        }

        window.onload = startCall;
    </script>
</body>
</html>
